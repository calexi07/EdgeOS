<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pair Journal — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
<div class="shell">
  <nav class="sidebar" id="sidebar-mount"></nav>
  <main class="content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
      <div>
        <h1 class="display" style="font-size:26px; margin:0;">Dashboard global</h1>
        <p style="color:var(--text-muted); margin:4px 0 0; font-size:13px;">Statistici pe toate conturile \u0219i toate perechile</p>
      </div>
      <button class="btn" onclick="openAddPairModal()">+ Pereche nou\u0103</button>
    </div>

    <div id="global-stats" class="stat-grid" style="margin-bottom:24px;"></div>

    <div class="card" style="margin-bottom:24px;">
      <h3 class="display" style="font-size:15px; margin:0 0 14px;">Equity curve (toate conturile)</h3>
      <canvas id="equity-chart" height="90"></canvas>
    </div>

    <div class="card" style="margin-bottom:24px;">
      <h3 class="display" style="font-size:15px; margin:0 0 14px;">Statistici per pereche</h3>
      <div id="per-pair-table"></div>
    </div>

    <div class="card">
      <h3 class="display" style="font-size:15px; margin:0 0 14px;">Statistici per cont</h3>
      <div id="per-account-table"></div>
    </div>
  </main>
</div>

<div id="modal-root"></div>

<script src="js/config.js"></script>
<script src="js/common.js"></script>
<script src="js/dashboard.js"></script>
<script>
  renderSidebar('dashboard');
  loadDashboard();
</script>
</body>
</html>
